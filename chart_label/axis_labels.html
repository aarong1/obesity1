const cats = ['Apples','Bananas','Cherries'];
const iconMap = { Apples: 'g', Bananas: 'b', Cherries: 'o' };

const option = {
  grid: { left: 60, right: 20, top: 20, bottom: 40 },
  xAxis: {
    type: 'category',
    data: cats,
    axisLabel: {
      formatter: function (value) {
        // prepend icon token, then text token
        const k = iconMap[value] || 'g';
        return `{${k}|}{t| ${value}}`;
      },
      // define rich tokens; each icon token uses an SVG as a background image
      rich: {
        g: { width: 16, height: 16, align: 'center', verticalAlign: 'middle',
             backgroundColor: { image: greenSVG } },
        b: { width: 16, height: 16, align: 'center', verticalAlign: 'middle',
             backgroundColor: { image: blueSVG } },
        o: { width: 16, height: 16, align: 'center', verticalAlign: 'middle',
             backgroundColor: { image: orangeSVG } },
        t: { padding: [0, 0, 0, 6], lineHeight: 16 }
      }
    }
  },
  yAxis: { type: 'value' },
  series: [{ type: 'bar', data: [12, 20, 15] }]
};

echarts.init(document.getElementById('chart')).setOption(option);
