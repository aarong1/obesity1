var myChart = echarts.init(chartDom);
var option;

const Icons = {

};

};

          borderRadius: 10,

          borderColor: '#ff8811'

          height: 20,
          align: 'right',

            image: Icons.Ownership
          },
          borderRadius: 10,
          borderWidth: 0,
          borderColor: '#ff8811'
        }

      name: 'DZ',
      type: 'bar',
      itemStyle: {

      data: [80,60,40,80]

option && myChart.setOption(option);
